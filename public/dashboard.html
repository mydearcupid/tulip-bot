<script>
let currentKey = "";

async function loadConfig() {
  currentKey = document.getElementById("key").value;

  const res = await fetch("/api/config?key=" + currentKey);
  const data = await res.json();

  if (data.error) {
    alert("Invalid key");
    return;
  }

  document.getElementById("currencyName").value = data.currencyName || "";
  document.getElementById("triviaChance").value = data.triviaChance || "";
  document.getElementById("dailyRewardMax").value = data.dailyRewardMax || "";

  document.getElementById("configSection").style.display = "block";
}

async function saveConfig() {
  await fetch("/api/config", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      key: currentKey,
      currencyName: document.getElementById("currencyName").value,
      triviaChance: parseFloat(document.getElementById("triviaChance").value),
      dailyRewardMax: parseInt(document.getElementById("dailyRewardMax").value)
    })
  });

  alert("Saved");
}
</script>
